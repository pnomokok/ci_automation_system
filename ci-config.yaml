runtime: python
image: python:3.11-slim

steps:
  install:
    command: apt-get update -qq && apt-get install -y -qq git nodejs npm > /dev/null 2>&1 && python -m venv .venv-orchestrator && .venv-orchestrator/bin/pip install -q -r orchestrator/requirements.txt && python -m venv .venv-repomanager && .venv-repomanager/bin/pip install -q -r repo-manager/requirements.txt && python -m venv .venv-runner && .venv-runner/bin/pip install -q -r runner/requirements.txt && cd dashboard && npm ci --loglevel=error && cd .. && .venv-runner/bin/pip install -q nodeenv && .venv-runner/bin/nodeenv --node=20.11.0 .nodeenv --prebuilt -q
    timeout: 1200
    network: bridge
  build:
    command: echo "No build step"
    timeout: 60
    network: none
  test:
    command: export PATH="$(pwd)/.nodeenv/bin:$PATH" && export GIT_PYTHON_REFRESH=quiet && result=0; cd orchestrator && ../.venv-orchestrator/bin/pytest tests/ -v --tb=short || result=1; cd ../repo-manager && ../.venv-repomanager/bin/pytest tests/ -v --tb=short || result=1; cd ../runner && ../.venv-runner/bin/pytest tests/ -v --tb=short || result=1; cd ../dashboard && node ./node_modules/.bin/vitest run || result=1; exit $result
    timeout: 360
    network: none

branches:
  - main
  - develop
  - feature/integration-1-2
  - feature/repo-manager
  - feature/runner-initial
  - feature/web-dashboard
  - feature/orchestrator-initial
