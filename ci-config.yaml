runtime: python
image: python:3.11-slim

steps:
  install:
    command: apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1 && python -m venv .venv-repomanager && .venv-repomanager/bin/pip install -q -r repo-manager/requirements.txt
    timeout: 180
  build:
    command: echo "No build step"
    timeout: 60
  test:
    command: apt-get update -qq && apt-get install -y -qq git > /dev/null 2>&1 && cd repo-manager && ../.venv-repomanager/bin/pytest tests/ -v --tb=short
    timeout: 120

branches:
  - main
  - develop
  - feature/integration-1-2
  - feature/repo-manager
  - feature/runner-initial
  - feature/web-dashboard
  - feature/orchestrator-initial
