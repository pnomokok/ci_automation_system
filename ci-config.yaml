runtime: python
image: python:3.11-slim

steps:
  install:
    command: python -m venv .venv && .venv/bin/pip install -q -r orchestrator/requirements.txt
    timeout: 180
  build:
    command: echo "No build step"
    timeout: 60
  test:
    command: cd orchestrator && ../.venv/bin/pytest tests/ -v --tb=short
    timeout: 120

branches:
  - main
  - develop
  - feature/integration-1-2
  - feature/repo-manager
  - feature/runner-initial
  - feature/web-dashboard
  - feature/orchestrator-initial
