runtime: python
image: python:3.11-slim

steps:
  install:
    command: python -m venv .venv-orchestrator && .venv-orchestrator/bin/pip install -q -r orchestrator/requirements.txt && python -m venv .venv-repomanager && .venv-repomanager/bin/pip install -q -r repo-manager/requirements.txt
    timeout: 240
  build:
    command: echo "No build step"
    timeout: 60
  test:
    command: cd orchestrator && ../.venv-orchestrator/bin/pytest tests/ -v --tb=short && cd ../repo-manager && ../.venv-repomanager/bin/pytest tests/ -v --tb=short
    timeout: 180

branches:
  - main
  - develop
  - feature/integration-1-2
  - feature/repo-manager
  - feature/runner-initial
  - feature/web-dashboard
  - feature/orchestrator-initial
