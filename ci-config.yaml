runtime: python
image: python:3.11-slim

steps:
  install:
    command: apt-get update -qq && apt-get install -y -qq git nodejs npm > /dev/null 2>&1 && python -m venv .venv-orchestrator && .venv-orchestrator/bin/pip install -q -r orchestrator/requirements.txt && python -m venv .venv-repomanager && .venv-repomanager/bin/pip install -q -r repo-manager/requirements.txt && cd dashboard && npm ci --silent
    timeout: 360
  build:
    command: echo "No build step"
    timeout: 60
  test:
    command: apt-get update -qq && apt-get install -y -qq git nodejs > /dev/null 2>&1 && cd orchestrator && ../.venv-orchestrator/bin/pytest tests/ -v --tb=short && cd ../repo-manager && ../.venv-repomanager/bin/pytest tests/ -v --tb=short && cd ../dashboard && node ./node_modules/.bin/vitest run
    timeout: 240

branches:
  - main
  - develop
  - feature/integration-1-2
  - feature/repo-manager
  - feature/runner-initial
  - feature/web-dashboard
  - feature/orchestrator-initial
