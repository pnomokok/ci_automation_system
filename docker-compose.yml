services:

  # ── Altyapı ────────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ci_user
      POSTGRES_PASSWORD: ci_pass
      POSTGRES_DB: ci_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ci_user -d ci_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Kişi 1 · Irmak — CI Orchestrator ──────────────────────────────────────

  orchestrator:
    build: ./orchestrator
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://ci_user:ci_pass@postgres:5432/ci_db
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_EXPIRE_MINUTES: 60
      MAX_CONCURRENT_PIPELINES: 3
      PIPELINE_TIMEOUT_SEC: 600
    volumes:
      - workspaces:/shared/workspaces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Kişi 2 · Aleyna — Runner ───────────────────────────────────────────────

  runner:
    build: ./runner
    environment:
      ORCHESTRATOR_API_URL: http://orchestrator:8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_NAME: pipeline_jobs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspaces:/shared/workspaces
    depends_on:
      orchestrator:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Kişi 3 · Zeynep Sude — Repository Manager ─────────────────────────────

  repo-manager:
    build: ./repo-manager
    ports:
      - "8081:8081"
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8000
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-change-me}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      WORKSPACE_ROOT: /shared/workspaces
    volumes:
      - workspaces:/shared/workspaces
    depends_on:
      orchestrator:
        condition: service_healthy

  # ── Kişi 4 · Rabia — Web Dashboard ────────────────────────────────────────

  dashboard:
    build: ./dashboard
    ports:
      - "3000:80"
    depends_on:
      orchestrator:
        condition: service_healthy

volumes:
  postgres_data:
  workspaces:
